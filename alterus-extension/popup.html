<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 280px;
    background: #06080F;
    color: #EEF0FF;
    font-family: -apple-system, BlinkMacSystemFont, 'DM Sans', sans-serif;
    font-size: 13px;
  }

  .header {
    padding: 16px;
    border-bottom: 1px solid #1E2235;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-family: Georgia, serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.08em;
  }
  .version {
    font-size: 10px;
    color: #475569;
    font-family: monospace;
  }

  .section {
    padding: 14px 16px;
    border-bottom: 1px solid #1E2235;
  }
  .section-title {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #475569;
    margin-bottom: 10px;
    font-family: monospace;
  }

  input[type="text"] {
    width: 100%;
    background: #0A0D1A;
    border: 1px solid #1E2235;
    border-radius: 4px;
    color: #EEF0FF;
    padding: 7px 10px;
    font-size: 12px;
    font-family: inherit;
    outline: none;
    margin-bottom: 6px;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: #6366F1; }
  input[type="text"]::placeholder { color: #475569; }

  .label {
    font-size: 11px;
    color: #64748B;
    margin-bottom: 4px;
    display: block;
  }

  .status-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
  }
  .status-name { font-size: 12px; color: #94A3B8; }
  .status-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-family: monospace;
  }
  .status-badge.connected { background: rgba(34,197,94,0.15); color: #22C55E; }
  .status-badge.disconnected { background: rgba(71,85,105,0.2); color: #475569; }

  .save-btn {
    width: 100%;
    padding: 9px;
    background: #6366F1;
    border: none;
    border-radius: 4px;
    color: #fff;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s;
    margin-top: 8px;
  }
  .save-btn:hover { background: #818CF8; }

  .footer {
    padding: 10px 16px;
    font-size: 10px;
    color: #1E2235;
    text-align: center;
    font-family: monospace;
  }

  .saved-msg {
    font-size: 11px;
    color: #22C55E;
    text-align: center;
    margin-top: 6px;
    min-height: 16px;
    font-family: monospace;
  }
</style>
</head>
<body>

<div class="header">
  <span class="logo">✦ Alterus</span>
  <span class="version">v1.0</span>
</div>

<!-- User Setup -->
<div class="section">
  <div class="section-title">Your Profile</div>
  <label class="label">Your name</label>
  <input type="text" id="userName" placeholder="e.g. Sarah Chen">
  <label class="label">Your role</label>
  <input type="text" id="userRole" placeholder="e.g. VP of Product">
  <label class="label">Your company</label>
  <input type="text" id="userCompany" placeholder="e.g. Acme Corp">
  <label class="label">Key contacts (comma separated)</label>
  <input type="text" id="userStakeholders" placeholder="e.g. John Smith, Amy Lee, Bob Chen">
  <button class="save-btn" id="saveBtn">Save Profile</button>
  <div class="saved-msg" id="savedMsg"></div>
</div>

<!-- Connection Status -->
<div class="section">
  <div class="section-title">Connected Accounts</div>
  <div class="status-row">
    <span class="status-name">Gmail</span>
    <span class="status-badge disconnected" id="gmailStatus">Not connected</span>
  </div>
  <div class="status-row">
    <span class="status-name">Slack</span>
    <span class="status-badge disconnected" id="slackStatus">Not connected</span>
  </div>
  <div class="status-row">
    <span class="status-name">Outlook (scraping)</span>
    <span class="status-badge disconnected" id="outlookStatus">Not started</span>
  </div>
  <div class="status-row">
    <span class="status-name">Teams (scraping)</span>
    <span class="status-badge disconnected" id="teamsStatus">Not started</span>
  </div>
</div>

<!-- History stats -->
<div class="section">
  <div class="section-title">Corpus Status</div>
  <div class="status-row">
    <span class="status-name">Emails learned</span>
    <span class="status-badge connected" id="emailCount">0</span>
  </div>
  <div class="status-row">
    <span class="status-name">Chat messages</span>
    <span class="status-badge connected" id="chatCount">0</span>
  </div>
</div>

<div class="footer">alterus.io · Your AI Digital Twin</div>

<script>
  // Load saved config
  chrome.storage.local.get([
    'userConfig', 'gmailConnected', 'slackConnected',
    'gmailHistory', 'slackHistory', 'outlookHistory', 'teamsHistory'
  ], data => {
    if (data.userConfig) {
      document.getElementById('userName').value         = data.userConfig.name || '';
      document.getElementById('userRole').value         = data.userConfig.role || '';
      document.getElementById('userCompany').value      = data.userConfig.company || '';
      document.getElementById('userStakeholders').value = (data.userConfig.stakeholders || []).join(', ');
    }

    // Connection status
    if (data.gmailConnected) setBadge('gmailStatus', 'Connected', true);
    if (data.slackConnected) setBadge('slackStatus', 'Connected', true);

    const outlookCount = (data.outlookHistory || []).length;
    const teamsCount   = (data.teamsHistory || []).length;
    if (outlookCount > 0) setBadge('outlookStatus', `${outlookCount} emails`, true);
    if (teamsCount > 0)   setBadge('teamsStatus',   `${teamsCount} msgs`, true);

    // Corpus counts
    const emailCount = (data.gmailHistory || []).length + outlookCount;
    const chatCount  = (data.slackHistory || []).length + teamsCount;
    document.getElementById('emailCount').textContent = emailCount;
    document.getElementById('chatCount').textContent  = chatCount;
  });

  // Save profile
  document.getElementById('saveBtn').addEventListener('click', () => {
    const name = document.getElementById('userName').value.trim();
    const role = document.getElementById('userRole').value.trim();
    const company = document.getElementById('userCompany').value.trim();
    const stakeholders = document.getElementById('userStakeholders').value
      .split(',').map(s => s.trim()).filter(Boolean);

    chrome.storage.local.set({
      userConfig: { name, role, company, stakeholders }
    }, () => {
      const msg = document.getElementById('savedMsg');
      msg.textContent = '✓ Profile saved';
      setTimeout(() => { msg.textContent = ''; }, 2000);
    });
  });

  function setBadge(id, text, connected) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className   = `status-badge ${connected ? 'connected' : 'disconnected'}`;
  }
</script>
</body>
</html>
