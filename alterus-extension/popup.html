<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 280px;
    background: #06080F;
    color: #EEF0FF;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 13px;
  }
  .hdr {
    padding: 14px 16px;
    border-bottom: 1px solid #1E2235;
    display: flex; align-items: center; justify-content: space-between;
    background: #0A0D1A;
  }
  .logo { font-size: 17px; font-weight: 600; letter-spacing: 0.08em; }
  .ver  { font-size: 10px; color: #475569; }

  .sec { padding: 14px 16px; border-bottom: 1px solid #1E2235; }
  .sec-title {
    font-size: 9px; letter-spacing: 0.15em;
    text-transform: uppercase; color: #475569;
    margin-bottom: 10px;
  }

  label { font-size: 11px; color: #64748B; display: block; margin-bottom: 3px; }
  input {
    width: 100%; background: #0A0D1A;
    border: 1px solid #1E2235; border-radius: 4px;
    color: #EEF0FF; padding: 7px 10px;
    font-size: 12px; outline: none;
    margin-bottom: 8px; transition: border-color 0.2s;
  }
  input:focus { border-color: #6366F1; }
  input::placeholder { color: #475569; }

  .btn {
    width: 100%; padding: 9px;
    background: #6366F1; border: none;
    border-radius: 4px; color: white;
    font-size: 12px; font-weight: 500;
    cursor: pointer; transition: background 0.2s;
  }
  .btn:hover { background: #818CF8; }
  .saved { font-size: 11px; color: #22C55E; text-align: center; margin-top: 6px; min-height: 16px; }

  .status-row {
    display: flex; align-items: center;
    justify-content: space-between; padding: 5px 0;
  }
  .status-name { font-size: 12px; color: #94A3B8; }
  .badge {
    font-size: 9px; padding: 2px 8px;
    border-radius: 10px;
  }
  .badge.on  { background: rgba(34,197,94,0.15); color: #22C55E; }
  .badge.off { background: rgba(71,85,105,0.15); color: #475569; }

  .test-btn {
    width: 100%; padding: 7px;
    background: transparent; border: 1px solid #1E2235;
    border-radius: 4px; color: #64748B;
    font-size: 11px; cursor: pointer;
    margin-top: 8px; transition: all 0.2s;
  }
  .test-btn:hover { border-color: #6366F1; color: #818CF8; }

  .foot {
    padding: 10px 16px; font-size: 10px;
    color: #1E2235; text-align: center;
  }
</style>
</head>
<body>

<div class="hdr">
  <span class="logo">✦ Alterus</span>
  <span class="ver">v1.0</span>
</div>

<!-- Profile -->
<div class="sec">
  <div class="sec-title">Your Profile</div>
  <label>Your name *</label>
  <input id="name" placeholder="Sarah Chen" />
  <label>Work email (used to keep your data private)</label>
  <input id="email" placeholder="you@company.com" type="email" />
  <label>Role</label>
  <input id="role" placeholder="VP of Product" />
  <label>Company</label>
  <input id="company" placeholder="Acme Corp" />
  <label>Key contacts (comma separated)</label>
  <input id="stakeholders" placeholder="John Smith, Amy Lee, Bob Chen" />
  <button class="btn" id="saveBtn">Save Profile</button>
  <div class="saved" id="savedMsg"></div>
</div>

<!-- API URL -->
<div class="sec">
  <div class="sec-title">Server URL</div>
  <label>Alterus API URL</label>
  <input id="apiUrl" placeholder="https://alterus.onrender.com" />
  <button class="test-btn" id="testBtn">Test Connection</button>
  <div class="saved" id="testMsg"></div>
</div>

<!-- Status -->
<div class="sec">
  <div class="sec-title">Connected Accounts</div>
  <div class="status-row">
    <span class="status-name">Gmail</span>
    <span class="badge off" id="gmailBadge">Not connected</span>
  </div>
  <div class="status-row">
    <span class="status-name">Slack</span>
    <span class="badge off" id="slackBadge">Not connected</span>
  </div>
  <div class="status-row">
    <span class="status-name">Outlook history</span>
    <span class="badge off" id="outlookBadge">0 emails</span>
  </div>
  <div class="status-row">
    <span class="status-name">Teams history</span>
    <span class="badge off" id="teamsBadge">0 messages</span>
  </div>
</div>

<div class="foot">alterus.io · Your AI Digital Twin</div>

<script src="popup.js"></script>
</body>
</html>
